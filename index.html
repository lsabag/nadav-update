const topicLabel = {tech:'טכנולוגיה',biz:'עסקי',tool:'כלי',personal:'אישי',course:'פורטל',spirit:'רוח'};
const topicClass = {tech:'badge-tech',biz:'badge-biz',tool:'badge-tool',personal:'badge-personal',course:'badge-course',spirit:'badge-spirit'};

let currentTopic = 'all';
let currentSort = 'asc';

function filterTopic(topic, btn) {
  currentTopic = topic;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function sortEntries(val) { currentSort = val; render(); }

function toggleRead(id, e) {
  e.stopPropagation();
  if (readSet.has(id)) { readSet.delete(id); } else { readSet.add(id); }
  saveRead(readSet);
  const entry = document.getElementById('e-' + id);
  const btn = document.getElementById('cb-' + id);
  if (entry) entry.classList.toggle('read', readSet.has(id));
  if (btn) { btn.classList.toggle('checked', readSet.has(id)); btn.textContent = readSet.has(id) ? '✓' : ''; }
  updateProgress();
}

function toggleBody(id) {
  const body = document.getElementById('b-' + id);
  const chev = document.getElementById('ch-' + id);
  if (!body) return;
  const v = body.classList.contains('visible');
  body.classList.toggle('visible', !v);
  if (chev) chev.classList.toggle('open', !v);
}

function updateProgress() {
  const total = ENTRIES.length;
  const done = readSet.size;
  const pct = Math.round((done / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = done + ' / ' + total;
}

function render() {
  let entries = ENTRIES.filter(e => currentTopic === 'all' || e.topic === currentTopic);
  if (currentSort === 'desc') entries = [...entries].reverse();
  document.getElementById('count-badge').textContent = entries.length + ' נושאים';
  const nr = document.getElementById('no-results');
  const tl = document.getElementById('timeline');
  if (entries.length === 0) { tl.innerHTML = ''; nr.style.display = 'block'; return; }
  nr.style.display = 'none';

  tl.innerHTML = entries.map(e => {
    const isRead = readSet.has(e.id);
    const msgs = e.msgs.map(m => {
      const k = Object.keys(AV).find(k => m.a.startsWith(k)) || 'default';
      const a = AV[k];
      return `<div class="msg"><div class="msg-avatar" style="background:${a.bg};color:${a.c}">${a.i}</div><div class="msg-content"><div class="msg-author">${m.a}</div><div class="msg-text">${m.t}</div></div></div>`;
    }).join('');
    return `
<div class="entry${isRead?' read':''}" id="e-${e.id}">
  <div class="entry-header">
    <button class="check-btn${isRead?' checked':''}" id="cb-${e.id}" onclick="toggleRead(${e.id},event)" title="סמן כנקרא">${isRead?'✓':''}</button>
    <div class="entry-right" onclick="toggleBody(${e.id})">
      <span class="topic-badge ${topicClass[e.topic]}">${topicLabel[e.topic]}</span>
      <div class="entry-meta">
        <span class="entry-date">${e.date}</span>
        <span class="entry-title">${e.title}</span>
        <span class="entry-summary">${e.summary}</span>
        <span class="read-tag">✓ נקרא</span>
      </div>
    </div>
    <span class="chevron" id="ch-${e.id}" onclick="toggleBody(${e.id})">▼</span>
  </div>
  <div class="entry-body" id="b-${e.id}">
    <div class="msg-list">${msgs}</div>
  </div>
</div>`;
  }).join('');
  updateProgress();
}

render();
</script>
