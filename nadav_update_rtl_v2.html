let currentTopic = 'all';
let currentSort = 'asc';

function filterTopic(topic, btn) {
  currentTopic = topic;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function sortEntries(val) {
  currentSort = val;
  render();
}

function toggleRead(id, e) {
  e.stopPropagation();
  if (readSet.has(id)) { readSet.delete(id); } else { readSet.add(id); }
  saveRead(readSet);
  updateProgress();
  const entry = document.getElementById('entry-' + id);
  const btn = document.getElementById('check-' + id);
  const tag = document.getElementById('tag-' + id);
  if (entry) entry.classList.toggle('read', readSet.has(id));
  if (btn) btn.classList.toggle('checked', readSet.has(id));
  if (tag) tag.style.display = readSet.has(id) ? 'block' : 'none';
}

function toggleBody(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  if (!body) return;
  const isVisible = body.classList.contains('visible');
  body.classList.toggle('visible', !isVisible);
  chev.classList.toggle('open', !isVisible);
}

function updateProgress() {
  const total = ENTRIES.length;
  const done = readSet.size;
  const pct = Math.round((done / total) * 100);
  const fill = document.getElementById('prog-fill');
  const text = document.getElementById('prog-text');
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = done + ' / ' + total;
}

function render() {
  let entries = ENTRIES.filter(e => currentTopic === 'all' || e.topic === currentTopic);
  if (currentSort === 'desc') entries = [...entries].reverse();

  const tl = document.getElementById('timeline');
  const nr = document.getElementById('no-results');
  const cb = document.getElementById('count-badge');
  cb.textContent = entries.length + ' נושאים';

  if (entries.length === 0) { tl.innerHTML = ''; nr.style.display = 'block'; return; }
  nr.style.display = 'none';

  const topicLabel = { tech:'טכנולוגיה', biz:'עסקי', tool:'כלי', personal:'אישי', course:'פורטל', spirit:'רוח' };
  const topicClass = { tech:'badge-tech', biz:'badge-biz', tool:'badge-tool', personal:'badge-personal', course:'badge-course', spirit:'badge-spirit' };

  tl.innerHTML = entries.map(e => {
    const isRead = readSet.has(e.id);
    const msgs = e.messages.map(m => `
      <div class="msg">
        ${getAvatar(m.author)}
        <div class="msg-content">
          <div class="msg-author">${m.author}</div>
          <div class="msg-text">${m.text}</div>
        </div>
      </div>`).join('');

    return `
      <div class="entry${isRead ? ' read' : ''}" id="entry-${e.id}">
        <div class="entry-header">
          <button class="check-btn${isRead ? ' checked' : ''}" id="check-${e.id}" onclick="toggleRead(${e.id}, event)" title="סמן כנקרא">
            <span class="check-icon">✓</span>
          </button>
          <div class="entry-right" onclick="toggleBody(${e.id})">
            <span class="topic-badge ${topicClass[e.topic]}">${topicLabel[e.topic]}</span>
            <div class="entry-meta">
              <span class="entry-date">${e.date}</span>
              <span class="entry-title">${e.title}</span>
              <span class="entry-summary">${e.summary}</span>
              <span class="read-tag" id="tag-${e.id}" style="display:${isRead?'block':'none'}">✓ נקרא</span>
            </div>
          </div>
          <span class="chevron" id="chev-${e.id}" onclick="toggleBody(${e.id})">▼</span>
        </div>
        <div class="entry-body" id="body-${e.id}">
          <div class="msg-list">${msgs}</div>
        </div>
      </div>`;
  }).join('');

  updateProgress();
}

render();
</script>
